    <!-- Cabinet Construction Explorer Section -->
    <section id="construction" class="cabinet-explorer">
        <div class="container">
            <h2 class="section-title">Built to Last</h2>
            <p class="explorer-intro">See what makes Wrightline cabinets different. Every component is chosen for durability, function, and quality.</p>
            
            <div class="explorer-controls">
                <button class="view-toggle" id="viewToggle">
                    <span class="toggle-label assembled active">Assembled View</span>
                    <span class="toggle-label exploded">Exploded View</span>
                </button>
            </div>

            <div class="explorer-container">
                <!-- Cabinet Visualization -->
                <div class="cabinet-viewer" id="cabinetViewer">
                    <img id="cabinetImage" src="Base Cabinet Assembled.png" alt="Cabinet Construction" class="cabinet-image" />
                    <svg viewBox="0 0 800 900" class="cabinet-svg hotspot-overlay" id="cabinetSvg">
                        <!-- Hotspot markers only - image shows actual cabinet -->
                        <g class="exploded-parts" id="explodedParts" style="display: none;">
                            <!-- Top pieces -->
                            <rect class="cabinet-part" data-part="top-panel" x="250" y="20" width="300" height="10" fill="#C8B69C" stroke="#8B7355" stroke-width="2" />
                            
                            <!-- Back panel (top) -->
                            <rect class="cabinet-part" data-part="back-panel" x="270" y="50" width="260" height="8" fill="#D4C4B0" stroke="#8B7355" stroke-width="1.5" />
                            
                            <!-- Hinge -->
                            <circle class="cabinet-part" data-part="hinges" cx="220" cy="180" r="15" fill="#6B7280" stroke="#374151" stroke-width="2" />
                            <rect class="cabinet-part" data-part="hinges" x="212" y="175" width="16" height="30" rx="3" fill="#6B7280" stroke="#374151" stroke-width="1.5" />
                            
                            <!-- Door (left side) -->
                            <rect class="cabinet-part" data-part="door" x="120" y="120" width="180" height="380" rx="3" fill="#A67C52" stroke="#8B7355" stroke-width="2.5" />
                            <rect x="135" y="135" width="150" height="350" rx="2" fill="#C8A882" stroke="#A67C52" stroke-width="1.5" />
                            <circle cx="280" cy="310" r="8" fill="#6B7280" />
                            
                            <!-- Side panels -->
                            <rect class="cabinet-part" data-part="cabinet-box" x="320" y="100" width="15" height="450" fill="#B89968" stroke="#8B7355" stroke-width="2" />
                            <rect class="cabinet-part" data-part="finished-end" x="465" y="100" width="15" height="450" fill="#B89968" stroke="#8B7355" stroke-width="2" />
                            
                            <!-- Adjustable shelf -->
                            <rect class="cabinet-part" data-part="shelf" x="340" y="280" width="120" height="12" fill="#C8B69C" stroke="#8B7355" stroke-width="2" />
                            <circle cx="345" cy="286" r="3" fill="#6B7280" />
                            <circle cx="455" cy="286" r="3" fill="#6B7280" />
                            
                            <!-- Drawer slide (left) -->
                            <rect class="cabinet-part" data-part="drawer-slides" x="500" y="400" width="80" height="8" rx="2" fill="#9CA3AF" stroke="#6B7280" stroke-width="1.5" />
                            <circle cx="510" cy="404" r="3" fill="#374151" />
                            <circle cx="570" cy="404" r="3" fill="#374151" />
                            
                            <!-- Drawer box -->
                            <g class="cabinet-part" data-part="drawer-box">
                                <rect x="340" y="420" width="120" height="80" fill="#D4C4B0" stroke="#8B7355" stroke-width="2" />
                                <line x1="340" y1="420" x2="460" y2="420" stroke="#8B7355" stroke-width="1.5" />
                                <line x1="340" y1="500" x2="460" y2="500" stroke="#8B7355" stroke-width="1.5" />
                            </g>
                            
                            <!-- Drawer front (in front) -->
                            <rect class="cabinet-part" data-part="drawer-front" x="310" y="420" width="160" height="80" rx="2" fill="#A67C52" stroke="#8B7355" stroke-width="2.5" />
                            <rect x="320" y="430" width="140" height="60" rx="1" fill="#C8A882" stroke="#A67C52" stroke-width="1.5" />
                            <rect x="380" y="455" width="20" height="10" rx="2" fill="#6B7280" />
                            
                            <!-- Toe kick -->
                            <rect class="cabinet-part" data-part="toe-kick" x="340" y="570" width="120" height="30" fill="#5A4A3A" stroke="#4A3A2A" stroke-width="1.5" />
                            
                            <!-- Edge banding indicator -->
                            <line class="cabinet-part" data-part="edge-banding" x1="335" y1="100" x2="335" y2="550" stroke="#8B7355" stroke-width="4" stroke-linecap="round" />
                        </g>

                        <!-- Assembled view hotspots -->
                        <g class="assembled-parts active" id="assembledParts" style="display: none;">
                            <!-- Main cabinet body -->
                            <rect class="cabinet-part" data-part="cabinet-box" x="340" y="100" width="120" height="450" fill="#C8B69C" stroke="#8B7355" stroke-width="2.5" />
                            
                            <!-- Back panel (subtle) -->
                            <rect class="cabinet-part" data-part="back-panel" x="345" y="105" width="110" height="440" fill="#D4C4B0" stroke="#8B7355" stroke-width="1" />
                            
                            <!-- Interior finish -->
                            <rect x="345" y="105" width="110" height="440" fill="url(#woodGrain)" opacity="0.3" />
                            
                            <!-- Shelf -->
                            <rect class="cabinet-part" data-part="shelf" x="345" y="290" width="110" height="10" fill="#B89968" stroke="#8B7355" stroke-width="1.5" />
                            <circle cx="350" cy="295" r="2" fill="#6B7280" />
                            <circle cx="450" cy="295" r="2" fill="#6B7280" />
                            
                            <!-- Door -->
                            <rect class="cabinet-part" data-part="door" x="330" y="100" width="135" height="350" rx="2" fill="#A67C52" stroke="#8B7355" stroke-width="2.5" />
                            <rect x="340" y="110" width="115" height="330" rx="1" fill="#C8A882" stroke="#A67C52" stroke-width="1" />
                            <circle cx="450" cy="275" r="6" fill="#6B7280" />
                            
                            <!-- Hinge indicator -->
                            <rect class="cabinet-part" data-part="hinges" x="330" y="130" width="8" height="15" rx="2" fill="#6B7280" />
                            <rect class="cabinet-part" data-part="hinges" x="330" y="405" width="8" height="15" rx="2" fill="#6B7280" />
                            
                            <!-- Drawer -->
                            <rect class="cabinet-part" data-part="drawer-front" x="330" y="465" width="135" height="75" rx="2" fill="#A67C52" stroke="#8B7355" stroke-width="2.5" />
                            <rect x="340" y="475" width="115" height="55" rx="1" fill="#C8A882" stroke="#A67C52" stroke-width="1" />
                            <rect x="382" y="497" width="30" height="11" rx="2" fill="#6B7280" />
                            
                            <!-- Finished end panel -->
                            <rect class="cabinet-part" data-part="finished-end" x="465" y="100" width="12" height="450" fill="#B89968" stroke="#8B7355" stroke-width="2" />
                            
                            <!-- Toe kick -->
                            <rect class="cabinet-part" data-part="toe-kick" x="340" y="555" width="120" height="25" fill="#5A4A3A" stroke="#4A3A2A" stroke-width="1.5" />
                            
                            <!-- Edge banding -->
                            <line class="cabinet-part" data-part="edge-banding" x1="340" y1="100" x2="340" y2="550" stroke="#8B7355" stroke-width="3" stroke-linecap="round" />
                        </g>

                        <!-- Hotspot markers (numbers) -->
                        <g class="hotspot-markers" id="hotspotMarkers">
                            <g class="hotspot" data-part="cabinet-box" transform="translate(400, 250)">
                                <circle r="18" fill="#8B7355" opacity="0.9" />
                                <text x="0" y="6" text-anchor="middle" fill="white" font-size="16" font-weight="600">1</text>
                            </g>
                            <g class="hotspot" data-part="door" transform="translate(380, 200)">
                                <circle r="18" fill="#8B7355" opacity="0.9" />
                                <text x="0" y="6" text-anchor="middle" fill="white" font-size="16" font-weight="600">2</text>
                            </g>
                            <g class="hotspot" data-part="drawer-front" transform="translate(380, 500)">
                                <circle r="18" fill="#8B7355" opacity="0.9" />
                                <text x="0" y="6" text-anchor="middle" fill="white" font-size="16" font-weight="600">3</text>
                            </g>
                            <g class="hotspot" data-part="shelf" transform="translate(400, 295)">
                                <circle r="18" fill="#8B7355" opacity="0.9" />
                                <text x="0" y="6" text-anchor="middle" fill="white" font-size="16" font-weight="600">4</text>
                            </g>
                            <g class="hotspot" data-part="hinges" transform="translate(330, 180)">
                                <circle r="18" fill="#8B7355" opacity="0.9" />
                                <text x="0" y="6" text-anchor="middle" fill="white" font-size="16" font-weight="600">5</text>
                            </g>
                            <g class="hotspot" data-part="drawer-slides" transform="translate(540, 460)">
                                <circle r="18" fill="#8B7355" opacity="0.9" />
                                <text x="0" y="6" text-anchor="middle" fill="white" font-size="16" font-weight="600">6</text>
                            </g>
                        </g>
                    </svg>
                </div>

                <!-- Detail Panel -->
                <div class="detail-panel" id="detailPanel">
                    <div class="detail-card" id="detailCard">
                        <button class="detail-close" id="detailClose">×</button>
                        <div class="detail-number" id="detailNumber">1</div>
                        <h3 class="detail-title" id="detailTitle">Select a component</h3>
                        <p class="detail-description" id="detailDescription">Click on any numbered hotspot to learn about that cabinet component.</p>
                        <div class="detail-why" id="detailWhy"></div>
                    </div>
                </div>
            </div>

            <div class="explorer-cta">
                <a href="#contact" class="btn btn-primary btn-lg">Request a Cabinet Quote</a>
            </div>
        </div>
    </section>
